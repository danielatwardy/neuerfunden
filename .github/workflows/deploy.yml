name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'ausgabe-*.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy HTML files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "index.html,ausgabe-01.html,ausgabe-02.html,ausgabe-03.html,ausgabe-04.html,ausgabe-05.html,ausgabe-06.html,ausgabe-07.html,ausgabe-08.html,ausgabe-09.html,ausgabe-10.html,ausgabe-11.html,ausgabe-12.html,ausgabe-13.html"
          target: "/tmp/"

      - name: Deploy to Docker container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            CONTAINER=$(docker ps --format '{{.Names}}' | grep m7vzr57sbed02st4xn3vfzqm || echo "neuerfunden")
            docker cp /tmp/index.html $CONTAINER:/usr/share/nginx/html/index.html
            for f in ausgabe-01.html ausgabe-02.html ausgabe-03.html ausgabe-04.html ausgabe-05.html ausgabe-06.html ausgabe-07.html ausgabe-08.html ausgabe-09.html ausgabe-10.html ausgabe-11.html ausgabe-12.html ausgabe-13.html; do
              if [ -f /tmp/$f ]; then
                docker cp /tmp/$f $CONTAINER:/usr/share/nginx/html/$f
              fi
            done
            echo "DEPLOYED to $CONTAINER"
