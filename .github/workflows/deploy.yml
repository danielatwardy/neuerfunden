name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'ausgabe-*.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy HTML files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "index.html,ausgabe-01.html,ausgabe-02.html,ausgabe-03.html,ausgabe-04.html"
          target: "/tmp/"

      - name: Deploy to Docker container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            docker cp /tmp/index.html neuerfunden:/usr/share/nginx/html/index.html
            for f in ausgabe-01.html ausgabe-02.html ausgabe-03.html ausgabe-04.html; do
              if [ -f /tmp/$f ]; then
                docker cp /tmp/$f neuerfunden:/usr/share/nginx/html/$f
              fi
            done
            echo "DEPLOYED"
